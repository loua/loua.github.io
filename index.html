<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            text-align: center;
        }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .card {
            border: 1px solid #ccc;
            padding: 20px;
            border-radius: 10px;
        }
        .qr-placeholder img {
            width: 150px;
            height: 150px;
            object-fit: contain;
            margin: 10px auto;
        }
        .qr-placeholder {
            margin: 10px auto;
        }
        a {
            display: block;
            margin-top: 10px;
            word-wrap: break-word;
        }
    </style>
</head>
<body>

    <h1>Explore These Resources</h1>

    <div class="container">

        <div class="card">
            <h3>AI & Data Trends (Gartner)</h3>
            <div class="qr-placeholder">QR Code Here</div>
            <a href="https://www.gartner.com/en/newsroom/press-releases/2026-03-11-gartner-announces-top-predictions-for-data-and-analytics-in-2026" target="_blank">
                View Article
            </a>
        </div>

        <div class="card">
            <h3>Program Information</h3>
            <div class="qr-placeholder">
                <img src="applied_ai_minor.png" alt="Program Info QR Code">
            </div>
            <a href="http://catalog.northcentralcollege.edu/preview_program.php?catoid=30&poid=4922&returnto=3047" target="_blank">
                View Program
            </a>
        </div>

        <div class="card">
            <h3>Course: INFS 100</h3>
            <div class="qr-placeholder">QR Code Here</div>
            <a href="http://catalog.northcentralcollege.edu/content.php?filter%5B27%5D=INFS&filter%5B29%5D=100&filter%5Bcourse_type%5D=-1&filter%5Bkeyword%5D=&filter%5B32%5D=1&filter%5Bcpage%5D=1&cur_cat_oid=30&expand=&navoid=3043&search_database=Filter&filter%5Bexact_match%5D=1#acalog_template_course_filter" target="_blank">
                View Course Details
            </a>
        </div>

        <div class="card">
            <h3>Course: INFS 135</h3>
            <div class="qr-placeholder">QR Code Here</div>
            <a href="http://catalog.northcentralcollege.edu/content.php?filter%5B27%5D=INFS&filter%5B29%5D=135&filter%5Bcourse_type%5D=-1&filter%5Bkeyword%5D=&filter%5B32%5D=1&filter%5Bcpage%5D=1&cur_cat_oid=30&expand=&navoid=3043&search_database=Filter&filter%5Bexact_match%5D=1#acalog_template_course_filter" target="_blank">
                View Course Details
            </a>
        </div>

    </div>

</body>
</html>
